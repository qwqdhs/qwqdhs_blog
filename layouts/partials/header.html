<!-- 覆盖主题的 header，用自定义图片替换太极图标 -->
<header class="site-header">
    <div class="container">
        <div class="site-brand">
            <!-- 这里替换掉了太极 SVG，改成你的图片 -->
            <a href="{{ .Site.BaseURL | relLangURL }}" class="logo-link">
                <img src="/images/taichi.png" alt="Logo" style="height: 32px; width: 32px; border-radius: 50%; object-fit: cover;">
            </a>
            <span class="site-title"><a href="{{ .Site.BaseURL | relLangURL }}">{{ .Site.Title }}</a></span>
        </div>
        <nav class="site-nav">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </div>
</header>
