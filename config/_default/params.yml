########################################
# Basic Configuration
########################################

menu:
  - name: home
    url: ""
    icon: "f015"
  - name: archives
    url: "archives"
    icon: "f187"
  - name: about
    url: "about"
    icon: "f007"
  - name: friend
    url: "friend"
    icon: "f0c0"

mainSections: ["posts"]
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: "qwq的红石/屿寻sama"
email: qwqdhs@outlook.com
description: "欢迎来到我的博客"
subtitle:
  typing:
    enable: true
    strings:
      - "世界第一公主殿下"
      - "欢迎来到红石的博客"
      - "Ciallo~"
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: true
    showCursor: true
    cursorChar: "|"
    smartBackspace: false
  text: "世界第一公主殿下..."

banner: "images/banner.webp"
banner_srcset:
  enable: false
  srcset:
    - src: "images/banner-600w.webp"
      media: "(max-width: 479px)"
    - src: "images/banner-800w.webp"
      media: "(max-width: 799px)"
    - src: "images/banner.webp"
      media: "(min-width: 800px)"

avatar: "avatar.webp"

cover:
toc: true

open_graph:
  enable: true
  options:

excerpt_link: Read More
copyright:

footer:
  since: 2020
  powered: true
  count: true
  busuanzi: true
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

sidebar:
  position: right
  menu: true
  article:
    show_common: true

social:
  email: qwqdhs@outlook.com
  github: https://github.com/qwqdhs
  bilibili: https://space.bilibili.com/691911446
  steam: https://steamcommunity.com/id/qwqdhs/
  qq: 2248885109

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

only_show_capsule_in_index: false
uppercase_capsule: true
show_update_time: false

summary:
  enable: false
  style: 'subtitle'

rss:
  limit: 10
  showFullContent: false
  showCopyright: false

sort_order:
  taxonomy:
    category: date-reverse
    tag: date-reverse
  archive: date-reverse
  home: default

paginate:
  archive:
  post:

########################################
# CSS
########################################

layout:
  max_width: 1350px

triangle_badge:
  enable: false
  icon: github
  link: https://github.com/D-Sketon/hugo-theme-reimu

anchor_icon:

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

# ============================================================
# ========== 关键修复：启用 Font Awesome，关闭自定义图标字体 ==========
# ============================================================
icon_font: false   # ← 改为 false，让 Font Awesome 生效

custom_font:
  enable: false
  article:
  code:

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:

local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  enable: auto

########################################
# Analytics
########################################

baidu_analytics: false
google_analytics: false
clarity: false

########################################
# Markdown Display
########################################

mermaid:
  zoom: false

code_block:
  expand: true

clipboard:
  success:
    en: Copy successfully (*^▽^*)
    zh-CN: 复制成功 (*^▽^*)
    zh-TW: 複製成功 (*^▽^*)
    ja: コピー成功 (*^▽^*)
    pt-BR: Copiado com sucesso (*^▽^*)
  fail:
    en: Copy failed (ﾟ⊿ﾟ)ﾂ
    zh-CN: 复制失败 (ﾟ⊿ﾟ)ﾂ
    zh-TW: 複製失敗 (ﾟ⊿ﾟ)ﾂ
    ja: コピー失敗 (ﾟ⊿ﾟ)ﾂ
    pt-BR: Falha ao copiar (ﾟ⊿ﾟ)ﾂ
  copyright:
    enable: false
    count: 50
    license_type: by-nc-sa

math:
  katex:
    enable: true
  mathjax:
    enable: false
    options:
      [
        {
          tex:
            {
              tags: "ams",
              useLabelIds: true,
              inlineMath: [["$", "$"], ['\\(', '\\)']],
              displayMath: [["$$", "$$"], ['\\[', '\\]']],
              processEscapes: true,
              processEnvironments: true,
              autoload: { color: [], colorv2: ["color"] },
              packages: { "[+]": ["noerrors"] },
            },
          options:
            {
              skipHtmlTags:
                ["script", "noscript", "style", "textarea", "pre", "code"],
              ignoreHtmlClass: "tex2jax_ignore",
              processHtmlClass: "tex2jax_process",
            },
          loader: { load: ["input/asciimath", "[tex]/noerrors"] },
        },
      ]

anchor:
  explicit:
    enable: false
    marker: "{#anchor-"
    prefix: "anchor-"
  auto:
    enable: false
    length: 60

########################################
# Comment system
########################################

comment:
  title:
    en: Leave a comment
    zh-CN: 说些什么吧！
    zh-TW: 說些什麼吧！
    ja: コメントを残す
    pt-BR: Deixe um comentário
  default: waline

valine:
  enable: false
  appId:
  appKey:
  pageSize: 10
  avatar: mp
  placeholder: Just go go
  guest_info: nick,mail,link
  recordIP: true
  highlight: true
  visitor: false
  serverURLs: 

waline:
  enable: enable
  serverURL: "https://qwqdhs-blog-waline.vercel.app"
  locale: {}
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

twikoo:
  enable: false
  envId:
  region:

gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

giscus:
  enable: false
  repo:
  repoId:
  category:
  categoryId:
  mapping: mapping
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  theme:
    light:
    dark:

disqus:
  enable: false
  shortname:
  count: true

utterances:
  enable: false
  repo: owner/repo
  issue_term: title
  theme: auto

beaudar:
  enable: false
  repo: owner/repo
  branch: main
  issue_term: title
  issue_number:
  theme: auto
  label:
  input_position: top
  comment_order: desc
  keep_theme:
  loading:

########################################
# Search
########################################

algolia_search:
  enable: false
  appID:
  apiKey:
  indexName:
  hits:
    per_page: 10

########################################
# Animation
########################################

preloader:
  enable: true
  text:
    zh-CN: 世界第一公主殿下...
    zh-TW: 世界第一公主殿下...
    en: Loading...
    ja: 世界第一公主殿下...
    pt-BR: Carregando...
  icon:
  rotate: true

animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

firework:
  enable: true
  disable_on_mobile: false
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["var(--red-1)", "var(--red-2)", "var(--red-3)", "var(--red-4)"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["var(--red-0)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

########################################
# Extended features
########################################

article_copyright:
  enable: false
  content:
    author: true
    link: true
    title: false
    date: false
    updated: false
    license: true
    license_type: by-nc-sa

top:
  enable: true
  position: right
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

outdate:
  enable: false
  daysAgo: 180
  message:
    en: This article was last updated on {time}. Please note that the content may no longer be applicable.
    zh-CN: 本文最后更新于 {time}，请注意文中内容可能已不适用。
    zh-TW: 本文最後更新於 {time}，請注意文中內容可能已不適用。
    ja: この記事は最終更新日：{time}。記載内容が現在有効でない可能性がありますのでご注意ください。
    pt-BR: Este artigo foi atualizado pela última vez em {time}. Observe que o conteúdo pode não ser mais aplicável.

icp:
  icpnumber:
  beian:
  recordcode:

moe_icp:
  icpnumber:

sponsor:
  enable: false
  tip:
    zh-CN: 请我喝杯咖啡吧
    zh-TW: 請我喝杯咖啡吧
    en: Buy me a coffee
    ja: コーヒーを買ってください
    pt-BR: Compre-me um café
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true
  qr:

share:

home_categories:
  enable: false
  content:

########################################
# Experimental features
########################################

injector:
  head_begin:
  head_end: |
    <style>
      /* ---------- 整站红色 → 初音蓝 ---------- */
      :root {
        --red-0: #00bfff !important;
        --red-1: #4fc3f7 !important;
        --red-2: #81d4fa !important;
        --red-3: #b3e5fc !important;
        --red-4: #d4edf8 !important;
        --red-5: #e5f3fa !important;
        --red-5-5: #f0f8fc !important;
        --red-6: #f5fafd !important;
        --color-red-6-shadow: rgba(0, 191, 255, 0.6) !important;
        --color-red-3-shadow: rgba(0, 191, 255, 0.3) !important;
        --color-link: #0288d1 !important;
        --color-link-hover: #00e5ff !important;
      }

      .site-header {
        background: linear-gradient(135deg, #0288d1, #00bcd4) !important;
        border-bottom: none !important;
        box-shadow: 0 2px 12px rgba(0, 188, 212, 0.3) !important;
      }
      .site-title a, .site-nav a, .site-nav .menu-item {
        color: #ffffff !important;
      }
      .site-nav a:hover {
        color: #b2ebf2 !important;
      }

      .btn-primary,
      .tag-cloud .tag-item:hover,
      .pagination .page-item.active .page-link,
      .card .card-header {
        background-color: #00bfff !important;
        border-color: #00bfff !important;
        color: #fff !important;
      }
      a:hover,
      .post-title a:hover,
      .post-meta a:hover {
        color: #00bfff !important;
      }

      body {
        background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #80deea 100%) !important;
        background-attachment: fixed !important;
      }

      .main-content,
      .card,
      .post-item {
        background: rgba(255, 255, 255, 0.78) !important;
        backdrop-filter: blur(6px) !important;
        border-radius: 16px !important;
      }
    </style>
  body_begin:
  body_end:
  sidebar_begin:
  sidebar_end:

pjax:
  enable: false

quicklink:
  enable: false
  timeout: 3000
  priority: true
  ignores: []

service_worker:
  enable: false

live2d:
  enable: false
  position: left

live2d_widgets:
  enable: false
  position: left

pace:
  enable: true

