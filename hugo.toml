baseURL = "https://qwqdhs.com"
languageCode = "zh-cn"
title = "红石的个人博客"
theme = "reimu"
defaultContentLanguage = "zh-cn"

[languages]
  [languages.zh-cn]
    title = "红石的个人博客"
    languageName = "简体中文"
    weight = 1
  [languages.en]
    title = "qwqdhs's Blog"
    languageName = "English"
    weight = 2
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  archives = ["HTML"]
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = true
    style = "github"        # 推荐暗色主题：monokai、dracula、github-dark
    noClasses = false